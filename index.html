<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Table Linear Interpolation</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">v0.6.0</p>
          <h1>Table Linear Interpolation</h1>
          <div class="table-global-controls" aria-label="Table controls">
            <label class="field">
              <span>All X</span>
              <input id="all-target-x" type="number" step="any" inputmode="decimal">
            </label>
          </div>
        </div>
        <div class="global-controls" aria-label="Global controls">
          <button id="clear-all" type="button">Clear</button>
        </div>
      </header>

      <section id="table-grid" class="table-grid" aria-label="Interpolation comparison pairs"></section>
      <p id="save-state" class="save-state">Loading saved data</p>
    </main>

    <template id="comparison-card-template">
      <article class="comparison-card">
        <div class="version-stack">
          <label class="pair-name-field">
            <span>Table</span>
            <input class="pair-table-name" type="text" maxlength="32" aria-label="Shared table name">
          </label>
          <label class="pair-split-field">
            <span>Split %</span>
            <input class="pair-split-percent" type="number" min="35" max="75" step="1" aria-label="Row split percentage">
          </label>
        </div>
        <div class="split-handle" role="separator" aria-label="Resize table and plot panes" aria-orientation="vertical" tabindex="0"></div>
        <div class="comparison-plot-wrap" aria-label="Comparison plot">
          <div class="pair-plot-settings">
            <label class="pair-setting-field">
              <span>Plot W</span>
              <input class="pair-plot-width" type="number" min="300" max="1800" step="20" aria-label="Plot width">
            </label>
            <label class="pair-setting-field">
              <span>Plot H</span>
              <input class="pair-plot-height" type="number" min="120" max="520" step="10" aria-label="Plot height">
            </label>
            <label class="pair-setting-field label-field">
              <span>X Label</span>
              <input class="pair-x-axis-label" type="text" maxlength="18" aria-label="X axis label">
            </label>
            <label class="pair-setting-field label-field">
              <span>Y Label</span>
              <input class="pair-y-axis-label" type="text" maxlength="18" aria-label="Y axis label">
            </label>
            <label class="pair-setting-field">
              <span>X Min</span>
              <input class="pair-x-min" type="number" step="any" inputmode="decimal" aria-label="X axis minimum">
            </label>
            <label class="pair-setting-field">
              <span>X Max</span>
              <input class="pair-x-max" type="number" step="any" inputmode="decimal" aria-label="X axis maximum">
            </label>
            <label class="pair-setting-field">
              <span>Y Min</span>
              <input class="pair-y-min" type="number" step="any" inputmode="decimal" aria-label="Y axis minimum">
            </label>
            <label class="pair-setting-field">
              <span>Y Max</span>
              <input class="pair-y-max" type="number" step="any" inputmode="decimal" aria-label="Y axis maximum">
            </label>
          </div>
          <svg class="comparison-plot" viewBox="0 0 720 220" role="img" aria-label="Version comparison line plot">
            <text class="plot-title" x="360" y="22">Parameter 1</text>
            <g class="plot-ticks plot-x-ticks"></g>
            <g class="plot-ticks plot-y-ticks"></g>
            <line class="plot-axis-x" x1="34" y1="190" x2="690" y2="190"></line>
            <line class="plot-axis-y" x1="34" y1="14" x2="34" y2="190"></line>
            <polyline class="plot-line plot-line-a" points=""></polyline>
            <polyline class="plot-line plot-line-b" points=""></polyline>
            <line class="plot-input-line plot-input-line-a" x1="0" y1="14" x2="0" y2="190"></line>
            <line class="plot-input-line plot-input-line-b" x1="0" y1="14" x2="0" y2="190"></line>
            <circle class="plot-input-point plot-input-point-a" cx="0" cy="0" r="3.5"></circle>
            <circle class="plot-input-point plot-input-point-b" cx="0" cy="0" r="3.5"></circle>
            <g class="plot-point-layer-a"></g>
            <g class="plot-point-layer-b"></g>
            <text class="plot-empty" x="360" y="110">Need 2 points</text>
            <text class="plot-axis-label plot-x-label" x="360" y="208">X</text>
            <text class="plot-axis-label plot-y-label" x="12" y="110">Y</text>
            <g class="plot-svg-legend">
              <line class="plot-legend-line legend-a-line" x1="560" y1="22" x2="590" y2="22"></line>
              <text class="plot-legend-text legend-a-text" x="596" y="25">Version A</text>
              <line class="plot-legend-line legend-b-line" x1="646" y1="22" x2="676" y2="22"></line>
              <text class="plot-legend-text legend-b-text" x="682" y="25">Version B</text>
            </g>
          </svg>
        </div>
      </article>
    </template>

    <template id="version-table-template">
      <section class="version-table">
        <div class="version-header">
          <label class="table-title">
            <input class="table-enabled" type="checkbox">
            <span>Version</span>
            <input class="table-version" type="text" maxlength="40" aria-label="Version information">
          </label>
          <label class="table-value-field output-field">
            <span>Output Y</span>
            <output class="table-result-y">--</output>
          </label>
          <label class="row-stepper">
            <span>Points</span>
            <input class="row-count" type="number" min="1" max="64" step="1">
          </label>
          <div class="table-card-actions">
            <button class="clear-table" type="button">Clear</button>
          </div>
          <span class="table-result-detail" aria-live="polite">No complete rows</span>
        </div>
        <div class="breakpoint-wrap">
          <table class="breakpoint-table">
            <tbody class="breakpoint-body"></tbody>
          </table>
        </div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
